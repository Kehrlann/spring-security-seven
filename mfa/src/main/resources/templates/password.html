<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔑 Update Password [Spring Security Seven]</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
<nav th:replace="~{_auth-header :: nav}"></nav>

<h1>Update Password</h1>
<p th:if="${success}" style="color: green; text-align: center;">Password updated successfully!</p>
<form method="post" action="/password" th:if="${_csrf != null}">
    <input name="_csrf" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <label>
        New Password:
        <input type="password" name="newPassword" required>
    </label>
<p><button class="btn" type="submit">Update Password</button></p>
</form>
<p><a href="/private" class="btn">Back to private</a></p>

</body>
</html>
